A:
  name: "OEM compliance bet"
  description: "Prioritize the automotive OEM requirement by committing most available investment capacity to AI-enabled predictive quality management."
  core_tradeoff: "Maximizes chance of retaining the OEM contract, but leaves little capital, workforce, and plant capacity for the wind opportunity."

B:
  name: "Wind pivot bet"
  description: "Commit aggressively to the wind turbine partnership and redirect investment, hiring, and retooling capacity toward renewable-energy components."
  core_tradeoff: "Accelerates diversification away from automotive dependence, but increases the probability of losing the OEM contract."

C:
  name: "Sequential real-options strategy"
  description: "Pursue a limited OEM AI pilot first, negotiate conditional acceptance with the OEM, and delay full wind commitment until technical and financial gates are met."
  core_tradeoff: "Preserves flexibility, but risks satisfying neither side quickly enough: the OEM may reject partial compliance, while the wind partner may choose a faster supplier."

D:
  name: "Defensive cash-preservation strategy"
  description: "Limit investment, seek deadline extensions, preserve liquidity, and avoid major retooling until uncertainty decreases."
  core_tradeoff: "Reduces near-term financial exposure, but risks both OEM contract loss and missed wind-market timing."