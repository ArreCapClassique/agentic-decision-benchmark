A:
  name: "OEM assurance sprint"
  description: "Concentrate capital, management attention, and technical resources on satisfying the automotive OEM’s AI-enabled predictive quality requirement. Wind engagement is kept exploratory until OEM compliance risk is reduced."
  core_tradeoff: "Maximizes near-term contract protection and legal defensibility, but deepens customer concentration and may consume the scarce capital, talent, and plant capacity needed for renewable-energy diversification."

B:
  name: "Renewables acceleration"
  description: "Prioritize the wind turbine partnership by reserving retooling capacity, hiring wind-sector specialists, and offering the wind customer a strong capacity commitment within its decision window."
  core_tradeoff: "Improves strategic diversification and positions EuroTech in a growing renewables market, but increases the probability of OEM contract loss, near-term revenue shock, and contractual exposure if ramp-up milestones are missed."

C:
  name: "Non-binding dual negotiation"
  description: "Attempt to keep both opportunities open by offering the OEM a pilot-based AI roadmap and offering the wind customer a non-binding conditional ramp-up plan, without committing major capital until both parties respond."
  core_tradeoff: "Preserves optionality and liquidity, but creates a high risk that both counterparties see EuroTech as non-committal: the OEM may reject pilot-based compliance, while the wind customer may move to a faster supplier."

D:
  name: "Liquidity defense and strategic pause"
  description: "Freeze major transformation spending, preserve cash, seek deadline extensions, and avoid binding wind retooling commitments until financial and operational uncertainty decreases."
  core_tradeoff: "Protects short-term liquidity and workforce stability, but risks OEM termination, loss of the wind opportunity, and strategic drift in both automotive AI quality and renewable-energy markets."