finance:
  visibility: "finance_agent_only"
  synthetic: true
  brief_items:
    - id: "FIN-001"
      source_label: "Synthetic CFO memo"
      synthetic: true
      statement: "EuroTech can safely allocate only €18M–€22M over the next 18 months. A credible OEM AI compliance sprint and a credible wind retooling program cannot both be fully funded within this envelope."
      certainty: "high"
      relevance:
        - "investment_capacity"
        - "cash_flow"
        - "financial_viability"

    - id: "FIN-002"
      source_label: "Synthetic liquidity risk note"
      synthetic: true
      statement: "If the OEM contract is lost before wind revenue becomes stable, EuroTech may face a liquidity gap within 12–15 months."
      certainty: "high"
      relevance:
        - "revenue_exposure"
        - "transition_risk"
        - "cash_flow"

    - id: "FIN-003"
      source_label: "Synthetic finance planning note"
      synthetic: true
      statement: "A conditional dual-option approach would be financially acceptable only if both the OEM and wind partner accept staged commitments. If either party requires binding full-scale investment, the plan becomes financially unstable."
      certainty: "medium"
      relevance:
        - "financial_viability"
        - "investment_gates"
        - "external_dependency"

operations:
  visibility: "operations_agent_only"
