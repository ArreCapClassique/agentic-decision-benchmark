  visibility: "legal_agent_only"
  synthetic: true
  brief_items:
    - id: "LEG-001"
      source_label: "Synthetic OEM contract memo"
      synthetic: true
      statement: "The OEM has not confirmed that a pilot-based AI quality roadmap would satisfy the contract requirement. Without written acceptance, partial compliance may still count as non-compliance."
      certainty: "high"
      relevance:
        - "contract_risk"
        - "compliance"
        - "auditability"

    - id: "LEG-002"
      source_label: "Synthetic partnership risk note"
      synthetic: true
      statement: "The proposed wind partnership includes milestone penalties if EuroTech commits capacity but misses retooling or delivery deadlines."
      certainty: "high"
      relevance:
        - "contract_risk"
        - "wind_partnership"
        - "retooling_risk"

    - id: "LEG-003"
      source_label: "Synthetic legal negotiation note"
      synthetic: true
      statement: "A conditional dual-option strategy is legally defensible only if the OEM waiver and wind non-exclusivity terms are secured in writing before major resource commitments are made."
      certainty: "medium"
      relevance:
        - "contract_risk"
        - "external_dependency"
        - "compliance"

