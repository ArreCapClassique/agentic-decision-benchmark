      source_label: "Synthetic plant readiness memo"
      synthetic: true
      statement: "Only one plant can undergo major retooling without causing unacceptable disruption to current OEM deliveries."
      certainty: "high"
      relevance:
        - "production_disruption"
        - "operational_feasibility"
        - "capacity_constraint"

    - id: "OPS-002"
      source_label: "Synthetic production planning note"
      synthetic: true
      statement: "A full wind-component ramp-up would require 5–7 months of process validation before stable production quality can be guaranteed."
      certainty: "medium"
      relevance:
        - "retooling_risk"
        - "implementation_timeline"
        - "operational_feasibility"

    - id: "OPS-003"
      source_label: "Synthetic operations risk memo"
      synthetic: true
      statement: "Running an OEM AI rollout and wind retooling in parallel would create a scheduling conflict for the same maintenance windows, quality engineers, and plant managers."
      certainty: "high"
      relevance:
        - "production_disruption"
        - "resource_conflict"
        - "operational_feasibility"

