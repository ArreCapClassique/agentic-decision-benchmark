    - id: "HR-002"
      source_label: "Synthetic hiring market note"
      synthetic: true
      statement: "Recruiting senior AI quality engineers would likely take 6–9 months, while wind-sector manufacturing specialists may take 4–6 months."
      certainty: "medium"
      relevance:
        - "hiring_timeline"
